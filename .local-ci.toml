# local-ci configuration for stevedores-org/aivcs-human-in-the-loop.
# Mirrors .github/workflows/ci.yml so a green local-ci run means a green CI.
# Binary: stevedores-org/local-ci. See AGENTS.md §5.
#
# Forward-compat: package.json / tsconfig.json / eslint config land in Step A
# (#4). Until then, the `bun` dependency in [dependencies.optional] keeps
# local-ci from hard-failing on a fresh checkout — stages whose inputs are
# absent will surface as a no-op-shaped failure that's easy to skip.

[cache]
skip_dirs = [".git", ".github", ".local-ci-cache", "node_modules", "dist", "build", "coverage", ".turbo", ".vite"]
include_patterns = ["*.toml", "*.yaml", "*.yml", "*.md", "*.sh", "*.json", "*.ts", "*.tsx", "*.js", "*.jsx", "*.mjs", "*.cjs", "*.css", "*.html"]

[dependencies]
required = ["gitleaks"]
optional = ["bun", "actionlint", "yamllint", "shellcheck"]

[stages.typecheck]
# tsc via Bun. Runs from package.json `tsc` devDep once Step A (#4) lands.
cmd = ["bun", "run", "tsc", "--noEmit"]
timeout = 180
enabled = true
watch = ["**/*.ts", "**/*.tsx", "tsconfig*.json", "package.json"]

[stages.lint]
# ESLint via Bun. Forward-compatible shell wrapper matching CI.
cmd = ["sh", "-c", 'if grep -q "\"eslint\"" package.json || ls eslint.config.* .eslintrc.* >/dev/null 2>&1; then bun run eslint .; else echo "skip: eslint not configured yet"; fi']
depends_on = ["typecheck"]
timeout = 120
enabled = true
watch = ["**/*.ts", "**/*.tsx", "**/*.js", "**/*.jsx", "eslint.config.*", ".eslintrc.*", "package.json"]

[stages.test]
# Bun's built-in test runner. Forward-compatible shell wrapper matching CI.
cmd = ["sh", "-c", 'if find . -path ./node_modules -prune -o \( -name "*.test.*" -o -name "*.spec.*" -o -name "*_test_*" -o -name "*_spec_*" \) -print -quit | grep -q .; then bun test; else echo "skip: no test files yet"; fi']
depends_on = ["typecheck"]
timeout = 300
enabled = true
watch = ["**/*.ts", "**/*.tsx", "**/*.test.*", "**/*.spec.*", "package.json"]

[stages.build]
# Vite production build via Bun. `vite build` script lands in Step A (#4).
cmd = ["bun", "run", "build"]
depends_on = ["typecheck", "lint"]
timeout = 300
enabled = true
watch = ["**/*.ts", "**/*.tsx", "**/*.css", "**/*.html", "vite.config.*", "tsconfig*.json", "package.json", "index.html"]

[stages.gitleaks]
# Pinned via .github/workflows/ci.yml; local users get whatever is on PATH.
# `--no-banner --redact` keeps the output noise-free and the redactor on.
cmd = ["gitleaks", "detect", "--no-banner", "--redact"]
timeout = 60
enabled = true
