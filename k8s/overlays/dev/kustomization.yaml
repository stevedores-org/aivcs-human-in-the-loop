apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: aivcs-hitl-dev

resources:
  - ../../base

images:
  - name: us-central1-docker.pkg.dev/gcp-lornu-ai/lornu/aivcs-human-in-the-loop
    newTag: develop

configMapGenerator:
  - name: aivcs-hitl-config
    literals:
      - AIVCS_API_URL=https://api-dev.aivcs.io
      - SSO_ISSUER=https://auth-dev.aivcs.io
      - OAUTH_CLIENT_ID=aivcs-hitl
      - USE_MOCKS=false
      - REQUIRE_AUTH=true
      - DEMO_MODE=false

generatorOptions:
  disableNameSuffixHash: false

patches:
  - path: httproute-patch.yaml
    target:
      group: gateway.networking.k8s.io
      version: v1
      kind: HTTPRoute
      name: aivcs-human-in-the-loop

labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/instance: aivcs-hitl-dev
      lornu.ai/env: dev
