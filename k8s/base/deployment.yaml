apiVersion: apps/v1
kind: Deployment
metadata:
  name: aivcs-human-in-the-loop
  labels:
    app.kubernetes.io/name: aivcs-human-in-the-loop
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: aivcs
    lornu.ai/managed-by: dockworker
  annotations:
    checkov.io/skip1: CKV_K8S_14=Image tag is overridden dynamically by CD pipeline
    checkov.io/skip2: CKV_K8S_43=Image digest is overridden dynamically by CD pipeline
    checkov.io/skip3: CKV_K8S_35=Runtime secrets loaded as env vars are expected and standard in this app
spec:
  replicas: 1
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: aivcs-human-in-the-loop
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aivcs-human-in-the-loop
        app.kubernetes.io/component: frontend
        app.kubernetes.io/part-of: aivcs
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: us-central1-docker.pkg.dev/gcp-lornu-ai/lornu/aivcs-human-in-the-loop:develop
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            # Non-secret runtime config (AIVCS_API_URL, SSO_ISSUER) lives
            # in a per-env ConfigMap produced by configMapGenerator in
            # each overlay.
            - configMapRef:
                name: aivcs-hitl-config
            # Future session/API secrets: add ExternalSecret + secretRef here.
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /home/nonroot/.cache
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
        - name: cache
          emptyDir:
            sizeLimit: 64Mi
