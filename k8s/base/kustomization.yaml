apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Base manifests for aivcs-human-in-the-loop. Consumed by:
#   - k8s/overlays/dev    (namespace: aivcs-hitl-dev)
#   - k8s/overlays/prod   (namespace: aivcs-hitl-prod)
#
# Runtime secrets (ExternalSecret) land in a follow-up once upstream keys
# exist in ClusterSecretStore `lornu-secrets`.

resources:
  - deployment.yaml
  - service.yaml
  - httproute.yaml
  - networkpolicy.yaml

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/name: aivcs-human-in-the-loop
      app.kubernetes.io/part-of: aivcs
