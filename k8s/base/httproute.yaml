apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: aivcs-human-in-the-loop
  labels:
    app.kubernetes.io/name: aivcs-human-in-the-loop
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: aivcs
spec:
  parentRefs:
    - name: shared-tls-gateway
      namespace: gateway-system
      sectionName: https
  # Hostnames are set per overlay (dev / prod) via JSON-patch.
  # The base manifest carries a placeholder that overlays MUST override;
  # `placeholder.invalid.` is reserved per RFC 6761 and will never resolve.
  hostnames:
    - placeholder.invalid
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: aivcs-human-in-the-loop
          port: 80
          weight: 1
