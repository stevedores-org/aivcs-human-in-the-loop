name: PR title

# Enforce Conventional Commits on the PR title. The squash merge uses the
# PR title as the commit message; consistent titles keep `git log --oneline`
# scannable and drive the release-notes generator.

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read
  statuses: write

jobs:
  lint:
    # NOTE: this job name is the required status check pinned by
    # scripts/bootstrap-branch-protection.sh as `pr-title`. Update both
    # together if renamed.
    name: pr-title
    runs-on: ubuntu-latest
    steps:
      # amannn/action-semantic-pull-request v5.5.3 — pinned by SHA.
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Allowed Conventional-Commits types. Mirrors AGENTS.md §4.
          types: |
            feat
            fix
            chore
            docs
            refactor
            test
            perf
            ci
            build
            revert
          requireScope: false
          subjectPattern: ^[A-Za-z0-9].+$
          subjectPatternError: |
            The subject "{subject}" found in the PR title "{title}"
            must start with an alphanumeric character.
          wip: true
