# OCI build & publish for aivcs-human-in-the-loop.
#
# Triggers:
#   - push to `develop`  -> tags: develop, sha-<short>
#   - push to tag `v*`   -> tags: <semver>, latest, sha-<short>
#
# Build model:
#   - dockworker.toml is the canonical OCI manifest (ports, user, labels).
#   - The install URL advertised for the dockworker CLI currently serves
#     HTML, not a shell installer, so CI materializes the manifest with
#     docker buildx + docker/build-push-action instead.
#   - Builder stage uses debian-based oven/bun (not alpine) so Tailwind's
#     @tailwindcss/oxide native bindings load during `bun run build`.
#
# All third-party actions are pinned to a commit SHA. Bump deliberately.

name: oci-build

on:
  push:
    branches: [develop]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: oci-build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: stevedores-org/aivcs-human-in-the-loop

jobs:
  build:
    name: build & push multi-arch
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@49b3bc8e6bdd4a60e6116a5414239cba5943d3cf # v3.2.0
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349 # v3.7.1

      - name: Log in to GHCR
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@369eb591f429131d6889c46b94e711f089e6ca96 # v5.6.1
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Materialize OCI build file from dockworker.toml
        run: |
          set -euo pipefail
          mkdir -p .github/oci
          cat > .github/oci/Containerfile <<'EOF'
          # Materialized from dockworker.toml — do not edit by hand.
          # Regenerate by updating the heredoc in .github/workflows/oci-build.yml.
          FROM oven/bun:1.1.34 AS builder
          WORKDIR /app
          COPY package.json bun.lock ./
          RUN bun install --frozen-lockfile
          COPY . .
          RUN bun run build

          FROM oven/bun:1.1.34
          WORKDIR /app
          RUN groupadd -g 65532 nonroot && useradd -u 65532 -g nonroot -m nonroot
          COPY --from=builder /app/dist ./dist
          COPY --from=builder /app/scripts/serve-dist.ts ./scripts/serve-dist.ts
          RUN chown -R nonroot:nonroot /app
          USER 65532:65532
          EXPOSE 3000
          ENV NODE_ENV=production
          CMD ["bun", "run", "scripts/serve-dist.ts"]
          EOF

      - name: Build and push multi-arch image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: .github/oci/Containerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=oci-multi
          cache-to: type=gha,mode=max,scope=oci-multi
          provenance: true
          sbom: true
