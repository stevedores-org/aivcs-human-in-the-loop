# OCI build & publish for aivcs-human-in-the-loop.
#
# Builds a hermetic OCI tarball with `nix build` and pushes to Google Artifact
# Registry via `skopeo copy`. No Docker daemon, Dockerfile, or buildx.
#
# Triggers:
#   - push to `develop`  -> tags: develop, sha-<short>
#   - push to tag `v*`   -> tags: <semver>, latest, sha-<short>
#
# Required repo secrets:
#   - GCP_WORKLOAD_IDENTITY_PROVIDER
#   - GCP_SERVICE_ACCOUNT
#
# Optional repo variables (defaults shown):
#   - GCP_PROJECT_ID  (gcp-lornu-ai)
#   - GCP_REGION      (us-central1)
#   - GAR_REPO        (lornu)

name: oci-build

on:
  push:
    branches: [develop]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: oci-build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'gcp-lornu-ai' }}
  GCP_REGION: ${{ vars.GCP_REGION || 'us-central1' }}
  GAR_REPO: ${{ vars.GAR_REPO || 'lornu' }}
  IMAGE_NAME: aivcs-human-in-the-loop

jobs:
  build:
    name: nix build & push to GAR
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v5.0.0

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v1.2.2
        with:
          bun-version: latest

      - name: Install Nix
        uses: cachix/install-nix-action@ba0dd844c9180cbf77aa72a116d6fbc515d0e87b # v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token
          access_token_lifetime: 1800s

      - name: Configure skopeo policy
        run: |
          mkdir -p ~/.config/containers
          echo '{"default":[{"type":"insecureAcceptAnything"}]}' > ~/.config/containers/policy.json
          echo 'unqualified-search-registries = ["docker.io"]' > ~/.config/containers/registries.conf

      - name: Build frontend assets
        run: |
          set -euo pipefail
          bun install --frozen-lockfile
          bun run build

      - name: Build OCI image with Nix
        env:
          NIX_HITL_DIST: ${{ github.workspace }}/dist
        run: |
          set -euo pipefail
          nix build .#oci -L --impure
          ls -lh result

      - name: Compute image tags
        id: meta
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA:0:7}"
          TAGS=("sha-${SHORT_SHA}")
          if [ "${GITHUB_REF}" = "refs/heads/develop" ]; then
            TAGS+=("develop")
          fi
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAGS+=("latest")
            TAGS+=("${GITHUB_REF_NAME#v}")
          fi
          printf '%s\n' "${TAGS[@]}" > tags.txt
          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          cat tags.txt >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Push to GAR with skopeo
        env:
          ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
          GAR_REGISTRY: ${{ env.GCP_REGION }}-docker.pkg.dev
        run: |
          set -euo pipefail
          GAR_IMAGE="${GAR_REGISTRY}/${GCP_PROJECT_ID}/${GAR_REPO}/${IMAGE_NAME}"
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            echo "Pushing ${GAR_IMAGE}:${tag}"
            nix shell nixpkgs#skopeo -c skopeo copy \
              --dest-creds="oauth2accesstoken:${ACCESS_TOKEN}" \
              docker-archive:result \
              "docker://${GAR_IMAGE}:${tag}"
          done < tags.txt
          echo "Pushed ${GAR_IMAGE} ($(tr '\n' ' ' < tags.txt))"
