# Regenerate bun.lock on Dependabot npm PRs.
#
# Dependabot's npm ecosystem updates package.json but does not maintain Bun's
# text lockfile (bun.lock). CI runs `bun install --frozen-lockfile`, so each
# npm bump needs a matching lockfile commit or local-ci fails immediately.

name: dependabot-bun-lockfile

on:
  pull_request:
    branches: [develop, main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: dependabot-bun-lockfile-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  refresh-lockfile:
    if: >-
      github.actor == 'dependabot[bot]' &&
      startsWith(github.event.pull_request.head.ref, 'dependabot/npm')
    name: refresh-bun-lock
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: latest

      - name: Regenerate bun.lock
        run: bun install

      - name: Commit lockfile when changed
        run: |
          set -euo pipefail
          if git diff --quiet bun.lock; then
            echo "bun.lock already in sync"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bun.lock
          git commit -m "chore(deps): refresh bun.lock for frozen-lockfile CI"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
