# dockworker.toml - OCI Standard Configuration for aivcs-human-in-the-loop
#
# Canonical OCI manifest for this app. CI materializes it via docker buildx
# (see .github/workflows/oci-build.yml) because the dockworker CLI install
# feed at dockworker.ai/install.sh currently serves HTML, not an installer.
#
# Build sequence:
#   1. base = oven/bun:1.1.34 (debian; alpine breaks @tailwindcss/oxide)
#   2. bun install --frozen-lockfile
#   3. bun run build  (produces ./dist via Vite)
#   4. entrypoint serves ./dist on :3000 via scripts/serve-dist.ts

[package]
name = "aivcs-human-in-the-loop"
version = "0.1.0"
description = "Human-in-the-loop UI for the agent-driven VCS (aivcs)"
runtime = "bun"

[oci]
spec = "1.0"
builder = "buildx"
# Debian-based Bun. Alpine fails `bun run build` (Tailwind oxide native binding).
base = "oven/bun:1.1.34"

[oci.image]
authors = ["Stevedores Org <engineering@stevedores.org>"]
url = "https://github.com/stevedores-org/aivcs-human-in-the-loop"
source = "https://github.com/stevedores-org/aivcs-human-in-the-loop"
vendor = "stevedores-org"
licenses = "Apache-2.0"
title = "aivcs-human-in-the-loop"

[oci.image.labels]
"lornu.ai/component" = "aivcs-human-in-the-loop"
"lornu.ai/managed-by" = "dockworker"
"lornu.ai/runtime" = "bun"
"lornu.ai/team" = "platform"
"lornu.ai/kind" = "frontend-spa"

[oci.config]
user = "nonroot:nonroot"
workdir = "/app"
entrypoint = ["bun", "run", "scripts/serve-dist.ts"]
expose = ["3000/tcp"]
stop_signal = "SIGTERM"

[oci.config.env]
NODE_ENV = "production"
# AIVCS_API_URL and SSO_ISSUER are injected at runtime via k8s overlay
# ConfigMaps (aivcs-hitl-config), not baked into the image.

[build]
runtime = "bun"
engine = "buildx"

[[build.targets]]
name = "aivcs-human-in-the-loop"
image = "aivcs-human-in-the-loop"
steps = ["bun install --frozen-lockfile", "bun run build"]
output_dir = "dist"

[oci.platforms]
architectures = ["amd64", "arm64"]

[oci.security]
user = 65532
group = 65532
read_only_rootfs = true
no_new_privileges = true
drop_capabilities = ["ALL"]

[oci.sbom]
enabled = true
format = "spdx-json"

[oci.signing]
enabled = false
provider = "sigstore"
keyless = true

[registry]
url = "ghcr.io/stevedores-org"
name = "aivcs-human-in-the-loop"
tags = ["develop", "latest"]

[deploy]
targets = ["kubernetes"]
namespace = "aivcs-hitl-dev"
replicas = 1
