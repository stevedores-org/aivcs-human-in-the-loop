# Gitleaks configuration for stevedores-org/aivcs-human-in-the-loop.
# Detects committed secrets. Rules are content-based; allowlist below
# covers known-safe files (the design reference asset from Step A #4).

title = "stevedores-org/aivcs-human-in-the-loop Gitleaks Configuration"
version = 8

[[rules]]
id = "aws-access-key"
description = "AWS Access Key"
regex = '''(A3T[A-Z0-9]|AKIA|AGPA|AIDA|AROA|AIPA|ANPA|ANVA|ASIA)[A-Z0-9]{16}'''

[[rules]]
id = "aws-secret-key"
description = "AWS Secret Access Key"
regex = '''(?i)aws(.{0,20})?['\"][0-9a-zA-Z/+]{40}['\"]'''

[[rules]]
id = "gcp-service-account-key"
description = "GCP Service Account JSON Key"
regex = '''"private_key":\s*"-----BEGIN PRIVATE KEY-----'''

[[rules]]
id = "private-key"
description = "Private Key"
regex = '''-----BEGIN (RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----'''

[[rules]]
id = "cloudflare-api-token"
description = "Cloudflare API Token"
regex = '''[a-zA-Z0-9_-]{40}\.[a-zA-Z0-9_-]{6,8}\.[a-zA-Z0-9_-]{27}'''

[[rules]]
id = "cloudflare-global-key"
description = "Cloudflare Global API Key (legacy 37-char)"
regex = '''(?i)(cloudflare[_-]?api[_-]?key|cf[_-]?api[_-]?key)['":\s=]+[a-f0-9]{37}'''

[[rules]]
id = "generic-api-key"
description = "Generic API Key"
regex = '''(?i)(api[_-]?key|apikey)['":\s]+[a-zA-Z0-9_\-]{32,}'''

[[rules]]
id = "github-pat"
description = "GitHub Personal Access Token"
regex = '''gh[opsu]_[a-zA-Z0-9]{36}'''

[[rules]]
id = "slack-token"
description = "Slack Token"
regex = '''xox[baprs]-([0-9a-zA-Z]{10,48})'''

[[rules]]
id = "openai-key"
description = "OpenAI API Key"
regex = '''sk-[A-Za-z0-9]{32,}'''

[[rules]]
id = "anthropic-key"
description = "Anthropic API Key"
regex = '''sk-ant-[A-Za-z0-9_\-]{32,}'''

[allowlist]
description = "Allowlist for known-safe files."
paths = [
  '''\.gitleaks\.toml''',
  '''\.gitleaksignore''',
  '''\.gitignore''',
  # The Figma-Make design reference asset lands in Step A (#4). It is a
  # PNG export of the static mockup with no real credentials; gitleaks
  # binary-content heuristics can false-positive on PNG byte streams.
  '''docs/design/aivcs-mockup\.png''',
]
